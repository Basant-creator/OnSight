<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>OnSight - System Portal Access</title>
    <link rel="stylesheet" href="style.css"/>
    <script src="script.js" defer></script>
</head>
<body class="landing-body" style="display: flex; justify-content: center; align-items: center; min-height: 100vh;">



<div class="card highlight" style="width: 100%; max-width: 420px; z-index: 10; padding: 2.5rem; position: relative;">
    <button class="theme-toggle" style="position: absolute; top: 1rem; right: 1rem; color: var(--primary);" title="Toggle Dark/Light Mode">
        <span class="material-symbols-outlined">contrast</span>
    </button>
    <div style="text-align: center; margin-bottom: 2rem;">
        <h1 class="editorial-text gradient-text" style="font-size: 2rem; font-weight: 800; color: var(--primary);">OnSight.</h1>
        <p class="text-sub" style="margin-top: 0.5rem; letter-spacing: 0.1em; text-transform: uppercase;">Secure System Access</p>
    </div>

    <!-- Dynamic Error Display -->
    <div id="auth-error-box" style="display: none; background-color: rgba(236, 124, 138, 0.1); border: 1px solid var(--error); color: var(--error); padding: 0.75rem; border-radius: 0.5rem; margin-bottom: 1.5rem; font-size: 0.875rem; text-align: center; font-weight: bold;"></div>

    <form id="loginForm" class="flex-col gap-4">
        <div class="flex-col gap-1">
            <label class="text-sub" style="font-weight: bold; color: var(--on-surface);">Institutional Email</label>
            <div class="search-bar" style="width: 100%;">
                <span class="material-symbols-outlined" style="font-size: 1rem;">mail</span>
                <input type="email" id="email" required placeholder="admin@onsight.edu" style="width: 100%; height: 2.5rem; padding-left: 2.5rem; border-radius: 0.5rem; background-color: var(--surface-container-high); border: 1px solid var(--surface-bright);"/>
            </div>
        </div>

        <div class="flex-col gap-1" style="margin-bottom: 1rem;">
            <label class="text-sub" style="font-weight: bold; color: var(--on-surface);">Secure Password</label>
            <div class="search-bar" style="width: 100%;">
                <span class="material-symbols-outlined" style="font-size: 1rem;">lock</span>
                <input type="password" id="password" required placeholder="••••••••" style="width: 100%; height: 2.5rem; padding-left: 2.5rem; border-radius: 0.5rem; background-color: var(--surface-container-high); border: 1px solid var(--surface-bright);"/>
            </div>
        </div>

        <button type="submit" class="btn-card primary" style="height: 3rem; font-size: 1rem; border-radius: 0.5rem;">
            Authenticate
            <span class="material-symbols-outlined">login</span>
        </button>
    </form>
    
    <div style="text-align: center; margin-top: 2rem;">
        <a href="index.html" class="text-sub" style="text-decoration: underline; transition: color 0.2s;">&larr; Return to Landing Page</a>
    </div>
</div>

</body>
</html>
